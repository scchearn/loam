name: CLI

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - cli/**
      - .github/workflows/cli.yml
  push:
    branches: [main, feat/cli]
    paths:
      - Cargo.toml
      - Cargo.lock
      - cli/**
      - .github/workflows/cli.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy,rustfmt
      - run: cargo +1.94.1 fmt --all -- --check
      - run: cargo +1.94.1 clippy --locked --workspace --all-targets -- -D warnings

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: loam-ubuntu
            binary: target/release/loam
          - os: macos-14
            artifact: loam-macos
            binary: target/release/loam
          - os: windows-2022
            artifact: loam-windows
            binary: target/release/loam.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal
      - run: cargo +1.94.1 test --workspace --locked
      - run: cargo +1.94.1 build --release --locked --package loam
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7
