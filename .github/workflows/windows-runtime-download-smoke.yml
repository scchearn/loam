name: Windows Runtime Download Smoke

on:
  workflow_dispatch:
    inputs:
      runtime_version:
        description: Published runtime version to download (for example, 0.9.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  live-download:
    runs-on: windows-2022
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # This is deliberately manual: the requested runtime must already be
      # published, and ordinary PR/main CI should not depend on release timing.
      - name: Download and execute published runtime
        shell: cmd
        env:
          LOAM_RUNTIME_VERSION: ${{ inputs.runtime_version }}
        run: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .github\scripts\windows-runtime-download-smoke.ps1
