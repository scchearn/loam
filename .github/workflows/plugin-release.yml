name: Plugin Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # OIDC trusted publishing requires npm >= 11.5.1; the runner's default is older.
      - run: npm install -g npm@latest

      - name: Verify package version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          expected="${GITHUB_REF_NAME#v}"
          test "$version" = "$expected"

      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run

      # Auth is via GitHub OIDC (Trusted Publishing) — no token. Requires the
      # trusted publisher to be configured on npmjs.com for this repo + workflow.
      - name: Publish package
        run: npm publish --access public --provenance
