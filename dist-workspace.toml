[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.29.0"
# CI backends to support
ci = "github"
# Runtime releases are tagged cli-v<version>. Plain v<version> tags are plugin
# releases and must never trigger a runtime build.
tag-namespace = "cli"
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
]
# The archive format dist produces for its own artifacts. Loam's bootstrap never
# downloads or extracts these; it fetches the raw executables published by the
# custom artifact job below.
unix-archive = ".tar.gz"
windows-archive = ".zip"
# Loam distributes only through `npx skills add scchearn/loam`; dist's own
# user-wide installers would fight the scope-local runtime contract.
installers = []
# Publish jobs to run in CI
publish-jobs = []
# Raw runtime executables plus loam-runtime-manifest.json are attached by a
# checked-in reusable workflow rather than by hand-editing generated release.yml.
local-artifacts-jobs = ["./raw-runtime-artifacts"]
# Build provenance attestations as release evidence. Bootstrap does not verify
# them in v1; SHA-256 in the manifest is the client-side integrity check.
github-attestations = true

# Keep generated workflows aligned with the repository's action-pinning policy.
[dist.github-action-commits]
"actions/checkout" = "3d3c42e5aac5ba805825da76410c181273ba90b1" # v7.0.1
"actions/upload-artifact" = "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
"actions/attest-build-provenance" = "ef244123eb79f2f7a7e75d99086184180e6d0018" # v1.4.4

# Pin the runner images so release builds stay reproducible.
[dist.github-custom-runners]
global = "ubuntu-22.04"
x86_64-unknown-linux-musl = "ubuntu-22.04"
aarch64-unknown-linux-musl = "ubuntu-22.04-arm"
x86_64-apple-darwin = "macos-14"
aarch64-apple-darwin = "macos-14"
x86_64-pc-windows-msvc = "windows-2022"
